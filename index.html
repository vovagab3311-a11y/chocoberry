<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>ChocoBerry | Premium сладости</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background-color: #5E1828; /* благородный бордовый фон */
            font-family: 'Inter', 'Segoe UI', 'Helvetica Neue', system-ui, -apple-system, sans-serif;
            line-height: 1.4;
            color: #997A00; /* тусклое золото */
            padding: 2rem 1.5rem;
        }

        .landing {
            max-width: 1400px;
            margin: 0 auto;
        }

        /* навигация */
        .nav {
            display: flex;
            justify-content: center;
            gap: 2rem;
            flex-wrap: wrap;
            margin-bottom: 3rem;
            border-bottom: 1px solid rgba(153, 122, 0, 0.35);
            padding-bottom: 1.2rem;
        }

        .nav-btn {
            background: transparent;
            border: none;
            font-size: 1.3rem;
            font-weight: 500;
            letter-spacing: 1px;
            text-transform: uppercase;
            color: #997A00;
            cursor: pointer;
            padding: 0.5rem 1.2rem;
            transition: all 0.25s ease;
            font-family: inherit;
            position: relative;
        }

        .nav-btn::after {
            content: '';
            position: absolute;
            bottom: -1.25rem;
            left: 0;
            width: 0;
            height: 2px;
            background-color: #4A0404;
            transition: width 0.2s;
        }

        .nav-btn.active {
            color: #f5d381;
            font-weight: 600;
        }

        .nav-btn.active::after {
            width: 100%;
            background-color: #4A0404;
        }

        .nav-btn:hover {
            color: #e0b354;
        }

        /* сетка карточек */
        .products-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
            gap: 2rem;
            margin-top: 1rem;
        }

        /* карточка — тёмно-бордовый бархат */
        .card {
            background: #3A1520; /* чуть светлее основного фона, но глубокий оттенок */
            border-radius: 28px;
            padding: 1.8rem 1.2rem 1.8rem 1.2rem;
            text-align: center;
            transition: transform 0.2s ease, box-shadow 0.2s ease;
            border: 1px solid rgba(153, 122, 0, 0.5);
            box-shadow: 0 12px 25px -10px rgba(0, 0, 0, 0.6);
            backdrop-filter: blur(0px);
            display: flex;
            flex-direction: column;
        }

        .card:hover {
            transform: translateY(-5px);
            border-color: #997A00;
            box-shadow: 0 22px 32px -12px rgba(0, 0, 0, 0.5);
        }

        .card-title {
            font-size: 1.7rem;
            font-weight: 600;
            letter-spacing: -0.3px;
            margin-bottom: 0.75rem;
            background: linear-gradient(135deg, #f5d381 0%, #997A00 100%);
            background-clip: text;
            -webkit-background-clip: text;
            color: transparent;
        }

        .card-desc {
            font-size: 0.9rem;
            color: #c9a86a;
            margin-bottom: 1rem;
            line-height: 1.4;
            padding: 0 0.3rem;
        }

        .card-quantity {
            font-size: 1rem;
            font-weight: 500;
            background: rgba(74, 4, 4, 0.5);
            display: inline-block;
            padding: 0.3rem 0.9rem;
            border-radius: 40px;
            margin: 0.75rem auto;
            color: #e6c683;
            letter-spacing: 0.3px;
            border: 0.5px solid rgba(153, 122, 0, 0.5);
        }

        .card-price {
            font-size: 1.7rem;
            font-weight: 700;
            margin: 0.8rem 0 1.2rem;
            color: #f5d381;
        }

        .card-price small {
            font-size: 0.9rem;
            font-weight: 400;
            color: #997A00;
        }

        .order-btn {
            background: #4A0404; /* кроваво-красный */
            border: 1px solid rgba(153, 122, 0, 0.6);
            color: #FCE39A;
            font-weight: 600;
            font-size: 1rem;
            padding: 0.9rem 1rem;
            border-radius: 60px;
            cursor: pointer;
            transition: all 0.2s ease;
            font-family: inherit;
            letter-spacing: 1px;
            margin-top: auto;
            width: 100%;
            text-transform: uppercase;
            box-shadow: 0 4px 10px rgba(0, 0, 0, 0.4);
        }

        .order-btn:hover {
            background: #630606;
            color: #FFE6A3;
            transform: scale(0.98);
            box-shadow: 0 2px 6px rgba(0, 0, 0, 0.6);
        }

        .premium-badge {
            text-align: center;
            margin-top: 3rem;
            font-size: 0.75rem;
            letter-spacing: 2px;
            color: #b87a5a;
            border-top: 1px solid rgba(153, 122, 0, 0.3);
            padding-top: 2rem;
        }

        @media (max-width: 700px) {
            body {
                padding: 1rem;
            }
            .nav {
                gap: 1rem;
            }
            .nav-btn {
                font-size: 1rem;
                padding: 0.3rem 0.8rem;
            }
            .card-title {
                font-size: 1.4rem;
            }
            .card-price {
                font-size: 1.4rem;
            }
        }

        @media (max-width: 480px) {
            .products-grid {
                grid-template-columns: 1fr;
                gap: 1.5rem;
            }
            .nav-btn {
                font-size: 0.9rem;
            }
        }
    </style>
</head>
<body>
<div class="landing">
    <div class="nav">
        <button class="nav-btn active" data-category="strawberry">Клубника</button>
        <button class="nav-btn" data-category="candies">Конфеты</button>
        <button class="nav-btn" data-category="dates">Финики</button>
    </div>

    <div id="productsGrid" class="products-grid"></div>
    <div class="premium-badge">CHOCOBERRY · PREMIUM HANDMADE · ДОСТАВКА ПО ВСЕЙ РОССИИ</div>
</div>

<script>
    const productsData = {
        strawberry: [
            {
                name: "Тёмный соблазн",
                description: "Клубника в 72% бельгийском шоколаде, ручная работа",
                quantity: "16 штук (расположение 4x4)",
                price: 1290,
                fullTitle: "Клубника в тёмном шоколаде"
            },
            {
                name: "Молочная нежность",
                description: "Молочный шоколад, ягода премиум-класса",
                quantity: "16 штук (расположение 4x4)",
                price: 1190,
                fullTitle: "Клубника в молочном шоколаде"
            },
            {
                name: "Белая мечта",
                description: "Изысканный белый шоколад с натуральной ванилью",
                quantity: "16 штук (расположение 4x4)",
                price: 1390,
                fullTitle: "Клубника в белом шоколаде"
            },
            {
                name: "Миндальный хруст",
                description: "Клубника в тёмном шоколаде + карамелизированный миндаль",
                quantity: "16 штук (расположение 4x4)",
                price: 1490,
                fullTitle: "Клубника с миндалём"
            },
            {
                name: "Премиум 24К",
                description: "Крупная ягода, двойной слой шоколада, съедобное золото",
                quantity: "16 штук (расположение 4x4)",
                price: 1690,
                fullTitle: "Премиум клубника"
            }
        ],
        candies: [
            {
                name: "Гранатовый взрыв",
                description: "Гранат в шоколаде, ручной глазури, кисло-сладкий вкус",
                quantity: "14 штук",
                price: 950,
                fullTitle: "Гранат в шоколаде"
            },
            {
                name: "Мастерская конфет",
                description: "Ассорти из пралине, трюфелей и карамели",
                quantity: "9 шт (конфеты ручной работы)",
                price: 1200,
                fullTitle: "Конфеты ручной работы"
            },
            {
                name: "Премиум набор",
                description: "Эксклюзивная подборка: 16 конфет премиум-серии",
                quantity: "16 штук",
                price: 2200,
                fullTitle: "Премиальный набор"
            }
        ],
        dates: [
            {
                name: "Королевские финики",
                description: "Финики Меджуль в шоколаде с фундуком и морской солью",
                quantity: "8 штук",
                price: 1100,
                fullTitle: "Королевские финики"
            }
        ]
    };

    function escapeHtml(str) {
        if (!str) return '';
        return str
            .replace(/&/g, '&amp;')
            .replace(/</g, '&lt;')
            .replace(/>/g, '&gt;')
            .replace(/"/g, '&quot;')
            .replace(/'/g, '&#39;');
    }

    function renderProducts(categoryKey) {
        const gridContainer = document.getElementById('productsGrid');
        if (!gridContainer) return;

        const items = productsData[categoryKey];
        if (!items || items.length === 0) {
            gridContainer.innerHTML = `<div style="text-align:center; grid-column:1/-1; padding:3rem; color:#c9a86a;">Товары в разработке</div>`;
            return;
        }

        let cardsHtml = '';
        for (let item of items) {
            cardsHtml += `
                <div class="card">
                    <div class="card-title">${escapeHtml(item.fullTitle)}</div>
                    <div class="card-desc">${escapeHtml(item.description)}</div>
                    <div class="card-quantity">
                        📦 ${escapeHtml(item.quantity)}
                    </div>
                    <div class="card-price">
                        ${item.price.toLocaleString('ru-RU')} <small>₽</small>
                    </div>
                    <button class="order-btn" data-product="${escapeHtml(item.fullTitle)}">ЗАКАЗАТЬ</button>
                </div>
            `;
        }

        gridContainer.innerHTML = cardsHtml;

        const allOrderBtns = document.querySelectorAll('.order-btn');
        allOrderBtns.forEach(btn => {
            btn.addEventListener('click', (e) => {
                e.stopPropagation();
                const productName = btn.getAttribute('data-product') || 'этот товар';
                alert(`✨ Спасибо! Ваша заявка на "${productName}" принята. Менеджер свяжется с вами. ✨`);
            });
        });
    }

    function initNavigation() {
        const navBtns = document.querySelectorAll('.nav-btn');

        function setActive(selectedCategory) {
            navBtns.forEach(btn => {
                const cat = btn.getAttribute('data-category');
                if (cat === selectedCategory) {
                    btn.classList.add('active');
                } else {
                    btn.classList.remove('active');
                }
            });
            renderProducts(selectedCategory);
        }

        navBtns.forEach(btn => {
            btn.addEventListener('click', (e) => {
                const category = btn.getAttribute('data-category');
                if (category === 'strawberry') setActive('strawberry');
                else if (category === 'candies') setActive('candies');
                else if (category === 'dates') setActive('dates');
            });
        });

        renderProducts('strawberry');
    }

    document.addEventListener('DOMContentLoaded', () => {
        initNavigation();
    });
</script>
</body>
</html>
